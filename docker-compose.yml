services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      cache_from:
        - emelmujiro/backend:latest
    image: emelmujiro/backend:${TAG:-latest}
    container_name: emelmujiro-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - DATABASE_URL=
      - SQLITE_DIR=/app/data
      # SECRET_KEY is loaded from env_file (backend/.env)
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-emelmujiro.com,api.emelmujiro.com,localhost,127.0.0.1,backend}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://emelmujiro.com}
    env_file:
      - ./backend/.env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - sqlite_data:/app/data
      - logs_volume:/app/logs
    networks:
      - emelmujiro-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: nginx:alpine
    container_name: emelmujiro-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - emelmujiro-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL — only started with: docker compose --profile postgres up
  db:
    image: postgres:15-alpine
    container_name: emelmujiro-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-emelmujiro}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    networks:
      - emelmujiro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-emelmujiro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  sqlite_data:
    driver: local
  logs_volume:
    driver: local

networks:
  emelmujiro-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
