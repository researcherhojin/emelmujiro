services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: emelmujiro-backend-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=
    env_file:
      - ./backend/.env.dev
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: uv run python manage.py runserver 0.0.0.0:8000
    networks:
      - emelmujiro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: emelmujiro-frontend-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    networks:
      - emelmujiro-network

  # PostgreSQL — only started with: docker compose --profile postgres up
  db:
    image: postgres:15-alpine
    container_name: emelmujiro-db-dev
    restart: unless-stopped
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=emelmujiro_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - emelmujiro-network
    profiles:
      - postgres

volumes:
  postgres_data_dev:
  static_volume:
  media_volume:

networks:
  emelmujiro-network:
    driver: bridge
