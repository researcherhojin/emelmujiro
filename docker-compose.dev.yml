services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: emelmujiro-backend-dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: uv run python manage.py runserver 0.0.0.0:8000
    networks:
      - emelmujiro-network
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: emelmujiro-frontend-dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    networks:
      - emelmujiro-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL — only started with: docker compose --profile postgres up
  db:
    image: postgres:15-alpine
    container_name: emelmujiro-db-dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=emelmujiro_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - emelmujiro-network
    profiles:
      - postgres

volumes:
  postgres_data_dev:
  static_volume:
  media_volume:

networks:
  emelmujiro-network:
    driver: bridge
