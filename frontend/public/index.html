    <noscript>
      <h1>에멜무지로 - AI 교육 · 컨설팅 · 솔루션 개발 전문 기업</h1>
      <p>기업의 AI 전환을 위한 솔루션 개발, 실전 교육, 전략 컨설팅을 제공합니다.</p>
      <p>자바스크립트를 활성화해주세요.</p>
    </noscript>
    <div id="root">
      <div class="min-h-screen flex items-center justify-center bg-white">
        <div class="animate-pulse">
          <div class="h-8 bg-gray-200 rounded w-48 mb-4"></div>
          <div class="h-4 bg-gray-200 rounded w-32"></div>
        </div>
      </div>
    </div>

    <script>
      // Theme detection — read from Zustand persisted store
      try {
        var stored = localStorage.getItem('app-store');
        var savedTheme = stored ? JSON.parse(stored).state && JSON.parse(stored).state.theme : null;
      } catch (e) {
        var savedTheme = null;
      }
      var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      var theme = savedTheme || systemTheme;

      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }

      var themeColorMeta = document.querySelector('meta[name="theme-color"]');
      if (themeColorMeta) {
        themeColorMeta.content = theme === 'dark' ? '#0f172a' : '#111827';
      }

      // KakaoTalk in-app browser redirect
      if (/KAKAOTALK/i.test(navigator.userAgent)) {
        location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
      }
    </script>
