user nginx;
worker_processes auto;

error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Exclude health check (Wget) from access log
    map $http_user_agent $loggable {
        ~^Wget  0;
        default 1;
    }
    access_log /var/log/nginx/access.log main if=$loggable;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 5m;

    # Rate limiting: 10 req/s per IP for API, burst allows short spikes
    # Use CF-Connecting-IP (Cloudflare real client IP), fall back to remote_addr
    map $http_cf_connecting_ip $rate_limit_key {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }
    limit_req_zone $rate_limit_key zone=api:10m rate=10r/s;

    # Gzip compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Shared security header values (nginx add_header in nested blocks overrides parent,
        # so every location block must repeat all headers — variables avoid string duplication)
        set $csp "default-src 'self'; script-src 'self' 'unsafe-inline' data: https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://api.emelmujiro.com https://*.sentry.io https://cdn.jsdelivr.net https://cloudflareinsights.com https://static.cloudflareinsights.com; frame-src https://docs.google.com; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'";
        set $perms "camera=(), microphone=(), geolocation=(), payment=()";

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy $perms always;
        add_header Content-Security-Policy $csp always;

        # API proxy
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Umami tracking API only — dashboard stays on localhost:3000 (not public)
        location = /umami/api/send {
            proxy_pass http://umami:3000/api/send;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # .well-known: serve files if they exist, 404 otherwise (no SPA fallback).
        # Without this, try_files in location / returns index.html as 200 for
        # non-existent .well-known paths — security scanners misinterpret the HTML
        # as a valid security.txt (observed: Palo Alto Cortex Xpanse, 2026-04-12).
        # No add_header here → inherits server-level security headers.
        location /.well-known/ {
            try_files $uri =404;
        }

        # Block common attack probes (WordPress, PHP, etc.)
        location ~* \.(php|asp|aspx|jsp|cgi|env)$ {
            return 444;
        }
        location ~* ^/(wp-|wordpress|xmlrpc|admin\.php|\.env|\.git) {
            return 444;
        }
        # Block WordPress probes regardless of path prefix
        # Catches /web/wp-includes/..., /cms/wp-admin/..., /shop/wp-content/..., etc.
        location ~* /wp-(includes|content|admin) {
            return 444;
        }

        # Redirect old /blog URLs to /insights
        location ~ ^/blog(.*)$ {
            return 301 /insights$1;
        }
        location ~ ^/en/blog(.*)$ {
            return 301 /en/insights$1;
        }

        # Redirect removed /share page to home
        location = /share {
            return 301 /;
        }
        location = /en/share {
            return 301 /en;
        }

        # React app — no-cache for HTML to ensure fresh SPA shell
        # Must repeat ALL security headers (nginx add_header in nested blocks overrides parent)
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy $perms always;
            add_header Content-Security-Policy $csp always;
        }

        # Cache static assets — must repeat ALL security headers (nginx add_header in nested blocks overrides parent)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy $perms always;
            add_header Content-Security-Policy $csp always;
        }
    }
}
