<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="google-site-verification"
      content="u19Ly4jKjdfFujf94xbOzOGhmblE8J45u0StME2j_s0"
    />

    <!-- SEO meta tags (description, OG, Twitter) are injected by SEOHelmet + prerendering per page -->
    <meta name="author" content="이호진" />

    <!-- Security headers via meta -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' data:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000 https://api.emelmujiro.com https://api.github.com https://*.sentry.io https://cdn.jsdelivr.net; frame-src https://docs.google.com; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />

    <!-- Resource hints for better performance. Preconnect > dns-prefetch for
         origins we definitely hit — Lighthouse flagged cdn.jsdelivr.net
         (Pretendard font) as missing preconnect. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://api.github.com" />
    <link rel="dns-prefetch" href="https://api.emelmujiro.com" />
    <link rel="preconnect" href="https://api.emelmujiro.com" crossorigin />

    <!-- Pretendard variable font (single ~2 MB woff2 covering all weights).
         Previously loaded the static version (pretendard.min.css) which
         pulled every weight × language subset as separate woff2 files —
         measured 3.8 MB total from JSDelivr in Lighthouse. The variable
         version is ~47% smaller because Pretendard's weight axis is a
         single axis interpolation. Family name is 'Pretendard Variable'
         (not 'Pretendard') — matched in index.css and this file's
         critical inline style. -->
    <link
      rel="preload"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
      />
    </noscript>

    <!-- Misc (robots, canonical, hreflang are injected by SEOHelmet + prerendering) -->
    <meta name="format-detection" content="telephone=no" />
    <!-- Critical CSS inline for above-the-fold content -->
    <style>
      /* Critical CSS for faster first paint */
      body {
        font-family:
          'Pretendard Variable',
          'Pretendard',
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>

    <!-- Global error handler for debugging blank page issues -->
    <script>
      window.__appLoaded = false;
      window.__errors = [];
      function __showError(msg) {
        if (window.__appLoaded) return;
        window.__errors.push(msg);
        var root = document.getElementById('root');
        if (!root) return;
        var href = location.href;
        var isKakao = window.__isKakaoInApp;
        var isAndroid = window.__isKakaoAndroid;
        var kakaoExternal = isAndroid
          ? 'intent://web/openExternal?url=' + encodeURIComponent(href) + '#Intent;scheme=kakaotalk;end'
          : 'kakaotalk://web/openExternal?url=' + encodeURIComponent(href);
        var ua = navigator.userAgent;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">' +
          '<div style="text-align:center;padding:20px;max-width:360px">' +
          '<p style="font-size:16px;color:#333;margin-bottom:8px;font-weight:600">페이지를 불러오는 중 오류가 발생했습니다.</p>' +
          '<p style="font-size:11px;color:#999;margin-bottom:16px;word-break:break-all;text-align:left;background:#f5f5f5;padding:8px;border-radius:6px">' +
          '<b>Error:</b> ' + window.__errors.join('<br>') + '<br><b>UA:</b> ' + ua.substring(0, 120) + '</p>' +
          (isKakao
            ? '<a href="' + kakaoExternal + '" style="display:inline-block;width:100%;padding:12px 24px;background:#FDE047;color:#333;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:8px;box-sizing:border-box">외부 브라우저에서 열기</a>'
            : '') +
          '<a href="' + href + '" style="display:inline-block;width:100%;padding:12px 24px;background:#4F46E5;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;box-sizing:border-box">새로고침</a>' +
          '</div></div>';
      }
      window.onerror = function(msg, src, line, col, err) {
        __showError(String(msg) + (src ? ' at ' + src.split('/').pop() + ':' + line : ''));
      };
      window.addEventListener('unhandledrejection', function(e) {
        __showError(e.reason ? String(e.reason) : 'Promise rejected');
      });
    </script>

    <!-- title is injected by SEOHelmet + prerendering -->

    <!-- Organization/Website/LocalBusiness/Service schemas are rendered by StructuredData.tsx -->
    <!-- Only FAQPage and Course are static here (not in StructuredData.tsx) -->

    <!-- FAQPage schema for Google rich snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "에멜무지로는 어떤 서비스를 제공하나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "에멜무지로는 기업 맞춤형 AI 교육, LLM/생성형 AI 솔루션 개발, AI 도입 전략 컨설팅을 제공합니다. 실전 경험 기반의 커리큘럼으로 이론과 실습을 병행합니다."
            }
          },
          {
            "@type": "Question",
            "name": "AI 교육 프로그램은 어떻게 진행되나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "맞춤형 커리큘럼을 통해 이론과 실습을 병행하며, 전문 강사진이 직접 교육을 진행합니다. Python, 머신러닝, 딥러닝, 생성형 AI, 프롬프트 엔지니어링 등 다양한 주제를 다룹니다."
            }
          },
          {
            "@type": "Question",
            "name": "컨설팅 서비스 비용은 어떻게 되나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "프로젝트 규모와 기간에 따라 상이하며, 무료 상담을 통해 견적을 제공해드립니다. 문의 페이지를 통해 연락주시면 빠르게 안내드리겠습니다."
            }
          },
          {
            "@type": "Question",
            "name": "어떤 분야의 AI 솔루션을 개발하나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "맞춤형 LLM 솔루션, Computer Vision, 자연어 처리(NLP), MLOps 파이프라인 구축 등 다양한 AI 솔루션을 개발합니다. 기업별 요구사항에 맞춘 AI 도입 전략도 함께 수립합니다."
            }
          }
        ]
      }
    </script>

    <!-- Course schema for education offerings -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Course",
        "name": "기업 맞춤형 AI 교육 프로그램",
        "description": "Python, 머신러닝, 딥러닝, 생성형 AI, 프롬프트 엔지니어링 등 실무 중심 AI 교육",
        "provider": {
          "@type": "Organization",
          "name": "에멜무지로",
          "url": "https://emelmujiro.com/"
        },
        "educationalLevel": "Beginner to Advanced",
        "inLanguage": "ko",
        "courseMode": "onsite",
        "hasCourseInstance": {
          "@type": "CourseInstance",
          "courseMode": "onsite",
          "instructor": {
            "@type": "Person",
            "name": "이호진",
            "jobTitle": "AI 연구자 및 교육자"
          }
        }
      }
    </script>

  </head>
  <body>
    <noscript>
      <h1>에멜무지로 | AI 교육 · 컨설팅 · 솔루션 개발 전문 기업</h1>
      <p>에멜무지로는 맞춤형 생성형 AI 교육, LLM 솔루션 구축, 기업 AI 전환 컨설팅을 제공하는 전문 기업입니다.</p>
      <nav>
        <ul>
          <li><a href="/profile">강의이력</a></li>
          <li><a href="/insights">인사이트</a></li>
          <li><a href="/contact">문의하기</a></li>
        </ul>
      </nav>
    </noscript>

    <!-- KakaoTalk detection — sets flags for Layout.tsx iOS banner and
         error handler fallback links. React loads normally in all browsers. -->
    <script>
      window.__isKakaoInApp = /KAKAOTALK/i.test(navigator.userAgent);
      window.__isKakaoAndroid = window.__isKakaoInApp && /Android/i.test(navigator.userAgent);
    </script>

    <div id="root">
      <!-- Loading skeleton — uses inline styles so it's visible before Tailwind CSS loads -->
      <div id="loading-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">
        <div>
          <div style="height:32px;background:#e5e7eb;border-radius:6px;width:192px;margin-bottom:16px"></div>
          <div style="height:16px;background:#e5e7eb;border-radius:6px;width:128px"></div>
        </div>
      </div>
    </div>

    <script>
      // Performance timing
      window.performanceStart = Date.now();

      // Network status detection
      try {
        if ('connection' in navigator) {
          var conn = navigator.connection;
          if (conn && conn.effectiveType) {
            document.documentElement.setAttribute('data-connection', conn.effectiveType);
            if (conn.effectiveType === 'slow-2g' || conn.effectiveType === '2g') {
              document.documentElement.classList.add('slow-connection');
            }
          }
        }
      } catch (e) {}

      // Theme detection — wrapped in try-catch for WebViews that restrict localStorage
      try {
        var savedTheme = localStorage.getItem('theme');
        var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var theme = savedTheme || systemTheme;
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.content = theme === 'dark' ? '#1F2937' : '#111827';
        }
      } catch (e) {}

      // General fallback: if nothing loads within 5 seconds, show detailed error.
      // This covers all browsers including in-app WebViews.
      setTimeout(function() {
        if (window.__appLoaded) return;
        var root = document.getElementById('root');
        if (!root) return;
        var href = location.href;
        var isKakao = window.__isKakaoInApp;
        var isAndroid = window.__isKakaoAndroid;
        var kakaoExternal = isAndroid
          ? 'intent://web/openExternal?url=' + encodeURIComponent(href) + '#Intent;scheme=kakaotalk;end'
          : 'kakaotalk://web/openExternal?url=' + encodeURIComponent(href);
        var errText = window.__errors.length
          ? window.__errors.join('<br>')
          : '앱이 5초 내에 로드되지 않았습니다.';
        var ua = navigator.userAgent;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">' +
          '<div style="text-align:center;padding:20px;max-width:360px">' +
          '<p style="font-size:16px;color:#333;margin-bottom:8px;font-weight:600">페이지를 불러오는 중 문제가 발생했습니다.</p>' +
          '<p style="font-size:11px;color:#999;margin-bottom:16px;word-break:break-all;text-align:left;background:#f5f5f5;padding:8px;border-radius:6px">' +
          '<b>Error:</b> ' + errText + '<br><b>UA:</b> ' + ua.substring(0, 120) + '</p>' +
          (isKakao
            ? '<a href="' + kakaoExternal + '" style="display:inline-block;width:100%;padding:12px 24px;background:#FDE047;color:#333;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:8px;box-sizing:border-box">외부 브라우저에서 열기</a>'
            : '') +
          '<a href="' + href + '" style="display:inline-block;width:100%;padding:12px 24px;background:#4F46E5;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;box-sizing:border-box">새로고침</a>' +
          '</div></div>';
      }, 5000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
