        }

    </script>

    <!-- KakaoTalk Android in-app browser: immediately show "open in browser" page.
         This runs BEFORE React or any framework JS, so it always works.
         iOS KakaoTalk uses WKWebView (Safari engine) which supports ES modules fine,
         so only Android is redirected. -->
    <script>
      window.__isKakaoInApp = /KAKAOTALK/i.test(navigator.userAgent);
      window.__isKakaoAndroid = window.__isKakaoInApp && /Android/i.test(navigator.userAgent);
      if (window.__isKakaoAndroid) {
        var href = 'intent://' + location.href.replace(/^https?:\/\//, '') + '#Intent;scheme=https;end';
        document.write(
          '<div id="kakao-redirect" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">' +
          '<div style="text-align:center;padding:20px;max-width:320px">' +
          '<div style="width:64px;height:64px;margin:0 auto 20px;border-radius:16px;background:linear-gradient(135deg,#4F46E5,#7C3AED);display:flex;align-items:center;justify-content:center">' +
          '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
          '</div>' +
          '<p style="font-size:18px;font-weight:600;color:#111827;margin:0 0 8px">에멜무지로</p>' +
          '<p style="font-size:14px;color:#6B7280;margin:0 0 24px;line-height:1.5">' +
          '카카오톡 브라우저에서는 페이지가<br/>정상적으로 표시되지 않을 수 있습니다.' +
          '</p>' +
          '<a href="' + href + '" ' +
          'style="display:inline-block;width:100%;padding:14px 24px;background:#4F46E5;color:#fff;' +
          'border-radius:12px;text-decoration:none;font-size:15px;font-weight:500;' +
          'box-sizing:border-box">' +
          '외부 브라우저에서 열기</a>' +
          '<p style="font-size:12px;color:#9CA3AF;margin:16px 0 0">Chrome 또는 Samsung Internet에서<br/>최적의 경험을 제공합니다.</p>' +
          '</div></div>'
        );
      }
    </script>

    <div id="root">
      <!-- Loading skeleton — uses inline styles so it's visible before Tailwind CSS loads -->
      <div id="loading-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">
        <div>
          <div style="height:32px;background:#e5e7eb;border-radius:6px;width:192px;margin-bottom:16px"></div>
          <div style="height:16px;background:#e5e7eb;border-radius:6px;width:128px"></div>
        </div>
      </div>
    </div>

    <script>
      // Performance timing
      window.performanceStart = Date.now();

      // If KakaoTalk detected, stop here — don't load the React app at all
      if (window.__isKakaoAndroid) {
        // Hide #root so React doesn't flash if module scripts somehow execute
        var r = document.getElementById('root');
        if (r) r.style.display = 'none';
      }

      // Network status detection
      try {
        if ('connection' in navigator) {
          var conn = navigator.connection;
          if (conn && conn.effectiveType) {
            document.documentElement.setAttribute('data-connection', conn.effectiveType);
            if (conn.effectiveType === 'slow-2g' || conn.effectiveType === '2g') {
              document.documentElement.classList.add('slow-connection');
            }
          }
        }
      } catch (e) {}

      // Theme detection — wrapped in try-catch for WebViews that restrict localStorage
      try {
        var savedTheme = localStorage.getItem('theme');
        var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var theme = savedTheme || systemTheme;
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.content = theme === 'dark' ? '#1F2937' : '#111827';
        }
      } catch (e) {}

      // General fallback: if nothing loads within 5 seconds, show a message.
      // Targets #root directly (not #loading-fallback) because React may have
      // already replaced #root's children during a failed render attempt.
      if (!window.__isKakaoAndroid) {
        setTimeout(function() {
          if (window.__appLoaded) return;
          var root = document.getElementById('root');
          if (root) {
            var href = location.href;
            root.innerHTML =
              '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">' +
              '<div style="text-align:center;padding:20px">' +
              '<p style="font-size:16px;color:#333;margin-bottom:12px">' +
              '페이지를 불러오는 중 문제가 발생했습니다.</p>' +
              '<a href="' + href + '" ' +
              'style="display:inline-block;padding:10px 24px;background:#4F46E5;color:#fff;' +
              'border-radius:8px;text-decoration:none;font-size:14px">' +
              '새로고침</a></div></div>';
          }
        }, 5000);
      }
    </script>
