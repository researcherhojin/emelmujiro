    <!-- Global error handler for debugging blank page issues -->
    <script>
      window.__appLoaded = false;
      window.__errors = [];
      function __showError(msg) {
        if (window.__appLoaded) return;
        window.__errors.push(msg);
        var root = document.getElementById('root');
        if (!root) return;
        var href = location.href;
        var isKakao = window.__isKakaoInApp;
        var kakaoExternal = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(href);
        var ua = navigator.userAgent;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">' +
          '<div style="text-align:center;padding:20px;max-width:360px">' +
          '<p style="font-size:16px;color:#333;margin-bottom:8px;font-weight:600">페이지를 불러오는 중 오류가 발생했습니다.</p>' +
          '<p style="font-size:11px;color:#999;margin-bottom:16px;word-break:break-all;text-align:left;background:#f5f5f5;padding:8px;border-radius:6px">' +
          '<b>Error:</b> ' + window.__errors.join('<br>') + '<br><b>UA:</b> ' + ua.substring(0, 120) + '</p>' +
          (isKakao
            ? '<a href="' + kakaoExternal + '" style="display:inline-block;width:100%;padding:12px 24px;background:#FDE047;color:#333;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:8px;box-sizing:border-box">외부 브라우저에서 열기</a>'
            : '') +
          '<a href="' + href + '" style="display:inline-block;width:100%;padding:12px 24px;background:#4F46E5;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;box-sizing:border-box">새로고침</a>' +
          '</div></div>';
      }
      window.onerror = function(msg, src, line, col, err) {
        __showError(String(msg) + (src ? ' at ' + src.split('/').pop() + ':' + line : ''));
      };
      window.addEventListener('unhandledrejection', function(e) {
        __showError(e.reason ? String(e.reason) : 'Promise rejected');
      });
    </script>

    <!-- KakaoTalk detection — sets flags for Layout.tsx banner (iOS) and
         Android redirect below. Also detects generic in-app browsers. -->
    <!-- KakaoTalk detection — sets flags for Layout.tsx iOS banner and
         error handler fallback links. React loads normally in all browsers. -->
    <script>
      window.__isKakaoInApp = /KAKAOTALK/i.test(navigator.userAgent);
      window.__isKakaoAndroid = window.__isKakaoInApp && /Android/i.test(navigator.userAgent);
    </script>

    <div id="root">
      <!-- Loading skeleton — uses inline styles so it's visible before Tailwind CSS loads -->
      <div id="loading-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">
        <div>

    </div>

    <script>
      // Performance timing
      window.performanceStart = Date.now();

      // Network status detection
      try {
        if ('connection' in navigator) {
          var conn = navigator.connection;
          if (conn && conn.effectiveType) {
            document.documentElement.setAttribute('data-connection', conn.effectiveType);
            if (conn.effectiveType === 'slow-2g' || conn.effectiveType === '2g') {
              document.documentElement.classList.add('slow-connection');
            }
          }
        }
      } catch (e) {}

      // Theme detection — wrapped in try-catch for WebViews that restrict localStorage
      try {
        var savedTheme = localStorage.getItem('theme');
        var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var theme = savedTheme || systemTheme;
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.content = theme === 'dark' ? '#1F2937' : '#111827';
        }
      } catch (e) {}

      // General fallback: if nothing loads within 5 seconds, show detailed error.
      // This covers all browsers including in-app WebViews.
      setTimeout(function() {
        if (window.__appLoaded) return;
        var root = document.getElementById('root');
        if (!root) return;
        var href = location.href;
        var isKakao = window.__isKakaoInApp;
        var kakaoExternal = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(href);
        var errText = window.__errors.length
          ? window.__errors.join('<br>')
          : '앱이 5초 내에 로드되지 않았습니다.';
        var ua = navigator.userAgent;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif">' +
          '<div style="text-align:center;padding:20px;max-width:360px">' +

          '<p style="font-size:11px;color:#999;margin-bottom:16px;word-break:break-all;text-align:left;background:#f5f5f5;padding:8px;border-radius:6px">' +
          '<b>Error:</b> ' + errText + '<br><b>UA:</b> ' + ua.substring(0, 120) + '</p>' +
          (isKakao
            ? '<a href="' + kakaoExternal + '" style="display:inline-block;width:100%;padding:12px 24px;background:#FDE047;color:#333;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:8px;box-sizing:border-box">외부 브라우저에서 열기</a>'
            : '') +
          '<a href="' + href + '" style="display:inline-block;width:100%;padding:12px 24px;background:#4F46E5;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;box-sizing:border-box">새로고침</a>' +
          '</div></div>';
      }, 5000);
    </script>
