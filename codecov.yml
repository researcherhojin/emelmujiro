codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      frontend:
        target: 60%
        threshold: 5%
        base: auto
        flags:
          - frontend
        paths:
          - frontend/src
      backend:
        target: 60%
        threshold: 5%
        base: auto
        flags:
          - backend
        paths:
          - backend/api

    patch:
      default:
        target: 60%
        threshold: 5%
        base: auto

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false

flags:
  frontend:
    paths:
      - frontend/src
    carryforward: false

  backend:
    paths:
      - backend/api
    carryforward: false

ignore:
  - "**/__tests__/**"
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/test-utils/**"
  - "**/mocks/**"
  - "frontend/src/setupTests.ts"
  - "frontend/src/utils/webVitals.ts"
  - "backend/api/tests.py"
  - "backend/api/tests_urls.py"
  - "backend/api/migrations/**"
  - "frontend/src/components/blog/TipTapEditor.tsx"
  - "frontend/src/components/blog/TipTapEditor.css"
  - "frontend/src/data/index.ts"
  - "frontend/src/constants/**"
