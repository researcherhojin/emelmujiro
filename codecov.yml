codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "95...100"

  status:
    project:
      frontend:
        target: 100%
        threshold: 1%
        base: auto
        flags:
          - frontend
        paths:
          - frontend/src
      backend:
        target: 100%
        threshold: 1%
        base: auto
        flags:
          - backend
        paths:
          - backend/api

    patch:
      default:
        target: 90%
        threshold: 3%
        base: auto

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false

flags:
  frontend:
    paths:
      - frontend/src
    carryforward: false

  backend:
    paths:
      - backend/api
    carryforward: false

ignore:
  # Test infrastructure
  - "**/__tests__/**"
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/test-utils/**"
  - "**/mocks/**"
  - "frontend/src/setupTests.ts"
  - "backend/api/tests.py"
  - "backend/api/tests_urls.py"
  - "backend/api/migrations/**"
  # Barrel exports — no executable logic, V8 cannot track re-exports
  - "frontend/src/constants/index.ts"
  - "frontend/src/test-utils/index.ts"
