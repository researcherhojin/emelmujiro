codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      frontend:
        target: 60%
        threshold: 5%
        base: auto
        flags:
          - frontend
        paths:
          - frontend/src
      backend:
        target: 60%
        threshold: 5%
        base: auto
        flags:
          - backend
        paths:
          - backend

    patch:
      default:
        target: 60%
        threshold: 5%
        base: auto

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false

flags:
  frontend:
    paths:
      - frontend/src
    carryforward: true

  backend:
    paths:
      - backend
    carryforward: true

ignore:
  - "**/__tests__/**"
  - "**/*.test.js"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.js"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/*.test.jsx"
  - "**/test-utils/**"
  - "**/mock/**"
  - "frontend/src/setupTests.ts"
  - "frontend/src/utils/webVitals.ts"
