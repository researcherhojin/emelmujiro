codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "85...95"

  status:
    project:
      frontend:
        target: 85%
        threshold: 3%
        base: auto
        flags:
          - frontend
        paths:
          - frontend/src
      backend:
        target: 85%
        threshold: 3%
        base: auto
        flags:
          - backend
        paths:
          - backend/api

    patch:
      default:
        target: 60%
        threshold: 3%
        base: auto

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false

flags:
  frontend:
    paths:
      - frontend/src
    carryforward: false

  backend:
    paths:
      - backend/api
    carryforward: false

ignore:
  # Test infrastructure
  - "**/__tests__/**"
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/test-utils/**"
  - "**/mocks/**"
  - "frontend/src/setupTests.ts"
  - "backend/api/tests.py"
  - "backend/api/tests_urls.py"
  - "backend/api/migrations/**"
  # External library wrapper — TipTap editor cannot be rendered in jsdom
  - "frontend/src/components/blog/TipTapEditor.tsx"
  - "frontend/src/components/blog/TipTapEditor.css"
  # Pure data constants — no executable logic, V8 does not track coverage
  - "frontend/src/constants/**"
