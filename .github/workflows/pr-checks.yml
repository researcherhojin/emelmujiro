name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Workflow-level default: read-only. Jobs that need write access
# opt in explicitly at job level (least-privilege principle).
permissions:
  contents: read

concurrency:
  group: "pr-checks-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

env:
  # Suppress "hint: Using 'master' as the name for the initial branch" from actions/checkout
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  # Dependabot auto-approve and auto-merge
  dependabot-auto-merge:
    name: Auto-Merge Dependabot
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve patch and minor updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Quick validation checks that should pass before running expensive tests
  quick-checks:
    name: Quick Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git merge-tree "$(git merge-base HEAD "$BASE_REF")" HEAD "$BASE_REF" | grep -q "<<<<<<< " && exit 1 || exit 0

      - name: Check commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          # Validate commit message format (skip merge commits)
          git log --format="%s" "${BASE_SHA}..${HEAD_SHA}" | while read msg; do
            # Skip merge commits
            if [[ "$msg" =~ ^Merge ]]; then
              continue
            fi
            # Skip dependabot commits (they follow their own format)
            if [[ "$msg" =~ ^Bump\ |^build\(deps|^chore\(deps|^ci\(deps|^deps-dev\(deps|^deps\(deps ]]; then
              continue
            fi
            if [[ ! "$msg" =~ ^(feat|fix|docs|style|refactor|test|chore|deps|ci)(\(.+\))?: ]]; then
              echo "Invalid commit message: $msg"
              echo "Please use conventional commits format: type(scope): description"
              exit 1
            fi
          done

      - name: File size check
        run: |
          # Check for large files (> 10MB)
          find . -type f -size +10M | grep -v node_modules | grep -v .git && echo "Large files detected!" && exit 1 || exit 0

      - name: SEO files check
        run: |
          MISSING=0
          # robots.txt, sitemap.xml, sitemap-index.xml are generated at build time (not in git)
          for f in frontend/public/manifest.json frontend/public/favicon.ico; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "$MISSING required SEO/static files missing"
            exit 1
          fi
          echo "All SEO files present"

      - name: Check i18n unused keys
        # Single source of truth: scripts/check-i18n-keys.sh.
        # --strict exits 1 on unused keys; default mode is informational (local use).
        run: ./scripts/check-i18n-keys.sh --strict

      - name: Check README test counts exist
        # Value-level verification (count == reality) lives in main-ci-cd.yml's
        # frontend-test/backend-test jobs, which parse the *real* Vitest/Django
        # output instead of relying on grep heuristics over test files.
        # grep undercounts because `it.each([...])` expands into N tests at runtime.
        run: |
          README_FE=$(grep -oE 'Vitest \([0-9]+ tests\)' README.md | grep -oE '[0-9]+')
          README_BE=$(grep -oE 'Django unittest \([0-9]+ tests\)' README.md | grep -oE '[0-9]+')
          if [ -z "$README_FE" ] || [ -z "$README_BE" ]; then
            echo "❌ README test counts missing"
            echo "Frontend: ${README_FE:-not found}, Backend: ${README_BE:-not found}"
            exit 1
          fi
          echo "README test counts present ($README_FE frontend + $README_BE backend)"

      - name: Check README badge versions match package.json
        run: |
          ERRORS=0
          check_badge() {
            local name="$1" pkg="$2"
            local pkg_ver=$(node -e "const p=require('./frontend/package.json'); console.log((p.dependencies['$pkg']||p.devDependencies['$pkg']||'').replace('^',''))")
            local badge_ver=$(grep -oE "$name-[0-9]+\.[0-9]+\.[0-9]+" README.md | head -1 | sed "s/${name}-//")
            if [ -n "$pkg_ver" ] && [ -n "$badge_ver" ] && [ "$pkg_ver" != "$badge_ver" ]; then
              echo "❌ $name badge: $badge_ver ≠ package.json: $pkg_ver"
              ERRORS=$((ERRORS + 1))
            fi
          }
          check_badge "React" "react"
          check_badge "Vite" "vite"
          check_badge "React_Router_DOM" "react-router-dom"
          check_badge "i18next" "i18next"
          check_badge "Axios" "axios"
          check_badge "Vitest" "vitest"
          check_badge "Playwright" "@playwright/test"
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ $ERRORS README badge(s) out of sync with package.json"
            echo "Run: scripts/update-test-counts.sh and manually update badges"
            exit 1
          fi
          echo "All README badges match package.json"

      - name: Check cron log redirect paths
        # Operational cron logs must live inside the project at backend/logs/
        # (matches Django LOG_DIR, already gitignored, persists via logs_volume).
        # Drift to /tmp, ~/logs/, or /var/log/ breaks on reboot or leaves
        # emelmujiro logs outside the project tree. See CLAUDE.md Constraints.
        run: |
          BAD_CRON_LOGS=$(grep -nE 'crontab.*>>' Makefile 2>/dev/null | grep -v 'backend/logs/' || true)
          if [ -n "$BAD_CRON_LOGS" ]; then
            echo "❌ Cron log redirect must target backend/logs/ (not /tmp, ~/logs/, or /var/log/):"
            echo "$BAD_CRON_LOGS"
            exit 1
          fi
          echo "Cron log paths OK"

  # Frontend linting (parallel with backend-lint)
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node

      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Prettier
        working-directory: ./frontend
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,md}"

  # Backend linting (parallel with frontend-lint)
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen --extra dev

      - name: Black check
        working-directory: ./backend
        run: uv run black --check .

      - name: Flake8
        working-directory: ./backend
        run: uv run flake8 . --max-line-length=120 --exclude=migrations,venv,.venv

  # Run only affected tests based on changed files
  affected-tests:
    name: Test Affected Code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          separator: ","

      - name: Setup Node.js with cache
        if: contains(steps.changed-files.outputs.all_changed_files, 'frontend/')
        uses: ./.github/actions/setup-node

      - name: Test frontend changes
        if: contains(steps.changed-files.outputs.all_changed_files, 'frontend/')
        working-directory: ./frontend
        run: CI=true npm test -- --run --passWithNoTests
        timeout-minutes: 10

      - name: Install uv
        if: contains(steps.changed-files.outputs.all_changed_files, 'backend/')
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Test backend changes
        if: contains(steps.changed-files.outputs.all_changed_files, 'backend/')
        working-directory: ./backend
        env:
          SECRET_KEY: test-secret-key-that-is-at-least-fifty-bytes-long-for-hmac-sha256
          DEBUG: "True"
          DATABASE_URL: ""
        run: |
          uv sync --frozen --extra dev
          uv run python manage.py makemigrations --check --noinput
          uv run python manage.py migrate --noinput
          uv run python manage.py test --parallel

  # Security scan for dependencies
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy
          restore-keys: ${{ runner.os }}-trivy

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy

  # Shared build job for bundle-analysis and lighthouse
  build-for-analysis:
    name: Build for Analysis
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node

      - name: Build frontend
        working-directory: ./frontend
        run: CI=false npm run build:no-prerender

      - name: Check bundle size
        run: |
          echo "Build size:"
          du -sh frontend/build/
          BUILD_SIZE=$(du -sb frontend/build/ | cut -f1)
          MAX_SIZE=10485760  # 10MB in bytes
          if [ $BUILD_SIZE -gt $MAX_SIZE ]; then
            echo "Build size exceeds 10MB limit!"
            echo "Current size: $(du -sh frontend/build/)"
            exit 1
          fi
          echo "Build size is acceptable: $(du -sh frontend/build/)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pr-build
          path: frontend/build/
          retention-days: 1

  # Lighthouse CI performance audit (uses shared build + bundle check)
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build-for-analysis
    if: needs.build-for-analysis.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: pr-build
          path: frontend/build/

      - name: Run Lighthouse CI
        working-directory: ./frontend
        run: npx @lhci/cli autorun

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: frontend/.lighthouseci/
          retention-days: 7
          if-no-files-found: ignore

  # E2E tests (Playwright — Chromium only for speed)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node

      - name: Get Playwright version
        id: playwright-version
        working-directory: ./frontend
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium (full)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: ./frontend
        run: npx playwright install-deps chromium

      - name: Run E2E tests (Chromium only)
        working-directory: ./frontend
        run: npx playwright test --project=chromium
        timeout-minutes: 10

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  # PR comment with results summary
  pr-comment:
    name: PR Summary
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pull-requests: write
    needs:
      [
        frontend-lint,
        backend-lint,
        affected-tests,
        security-scan,
        build-for-analysis,
        lighthouse,
        e2e-tests,
      ]
    steps:
      - name: Comment PR
        uses: actions/github-script@v9
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('## Pull Request Check Results')
            );

            const body = `## Pull Request Check Results

            | Check | Status |
            |-------|--------|
            | Frontend Lint | ${{ needs.frontend-lint.result == 'success' && '✅' || '❌' }} |
            | Backend Lint | ${{ needs.backend-lint.result == 'success' && '✅' || '❌' }} |
            | Tests | ${{ needs.affected-tests.result == 'success' && '✅' || '❌' }} |
            | Security | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |
            | Build & Size | ${{ needs.build-for-analysis.result == 'success' && '✅' || '❌' }} |
            | Lighthouse | ${{ needs.lighthouse.result == 'success' && '✅' || '❌' }} |
            | E2E Tests | ${{ needs.e2e-tests.result == 'success' && '✅' || needs.e2e-tests.result == 'failure' && '❌' || '⏭️' }} |

            <details>
            <summary>Details</summary>

            - **Commit:** ${{ github.sha }}
            - **Author:** ${{ github.actor }}
            - **Workflow Run:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            </details>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
