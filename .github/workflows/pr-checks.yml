name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Dependabot auto-approve and auto-merge
  dependabot-auto-merge:
    name: Auto-Merge Dependabot
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve patch and minor updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Quick validation checks that should pass before running expensive tests
  quick-checks:
    name: Quick Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        run: |
          git merge-tree $(git merge-base HEAD ${{ github.base_ref }}) HEAD ${{ github.base_ref }} | grep -q "<<<<<<< " && exit 1 || exit 0

      - name: Check commit messages
        run: |
          # Validate commit message format (skip merge commits)
          git log --format="%s" ${{ github.event.pull_request.base.sha }}..${{ github.sha }} | while read msg; do
            # Skip merge commits
            if [[ "$msg" =~ ^Merge ]]; then
              continue
            fi
            # Skip dependabot commits (they follow their own format)
            if [[ "$msg" =~ ^Bump\ |^build\(deps|^chore\(deps|^ci\(deps|^deps-dev\(deps|^deps\(deps ]]; then
              continue
            fi
            if [[ ! "$msg" =~ ^(feat|fix|docs|style|refactor|test|chore|deps|ci)(\(.+\))?: ]]; then
              echo "Invalid commit message: $msg"
              echo "Please use conventional commits format: type(scope): description"
              exit 1
            fi
          done

      - name: File size check
        run: |
          # Check for large files (> 10MB)
          find . -type f -size +10M | grep -v node_modules | grep -v .git && echo "Large files detected!" && exit 1 || exit 0

      - name: SEO files check
        run: |
          MISSING=0
          for f in frontend/public/robots.txt frontend/public/sitemap.xml frontend/public/manifest.json frontend/public/favicon.ico frontend/public/.nojekyll; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "$MISSING required SEO/static files missing"
            exit 1
          fi
          echo "All SEO files present"

  # Frontend linting (parallel with backend-lint)
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-cache
        with:
          path: |
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Prettier
        working-directory: ./frontend
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,css}"

  # Backend linting (parallel with frontend-lint)
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen --extra dev

      - name: Black check
        working-directory: ./backend
        run: uv run black --check .

      - name: Flake8
        working-directory: ./backend
        run: uv run flake8 . --max-line-length=120 --exclude=migrations,venv,.venv

  # Run only affected tests based on changed files
  affected-tests:
    name: Test Affected Code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          separator: ","

      - name: Setup Node.js
        if: contains(steps.changed-files.outputs.all_changed_files, 'frontend/')
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        if: contains(steps.changed-files.outputs.all_changed_files, 'frontend/')
        uses: actions/cache@v5
        id: node-cache
        with:
          path: |
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: contains(steps.changed-files.outputs.all_changed_files, 'frontend/') && steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Test frontend changes
        if: contains(steps.changed-files.outputs.all_changed_files, 'frontend/')
        working-directory: ./frontend
        run: CI=true npm test -- --run --passWithNoTests
        timeout-minutes: 10

      - name: Install uv
        if: contains(steps.changed-files.outputs.all_changed_files, 'backend/')
        uses: astral-sh/setup-uv@v7

      - name: Cache uv packages
        if: contains(steps.changed-files.outputs.all_changed_files, 'backend/')
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Test backend changes
        if: contains(steps.changed-files.outputs.all_changed_files, 'backend/')
        env:
          SECRET_KEY: test-secret-key
          DEBUG: "True"
          DATABASE_URL: ""
        run: |
          cd backend
          uv sync --frozen --extra dev
          uv run python manage.py makemigrations --noinput
          uv run python manage.py migrate --noinput
          uv run python manage.py test --parallel

  # Security scan for dependencies
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy
          restore-keys: ${{ runner.os }}-trivy

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy

  # Shared build job for bundle-analysis and lighthouse
  build-for-analysis:
    name: Build for Analysis
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-cache
        with:
          path: |
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Build frontend
        working-directory: ./frontend
        run: CI=false npm run build:no-prerender

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pr-build
          path: frontend/build/
          retention-days: 1

  # Size and performance budget checks (uses shared build)
  bundle-analysis:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: build-for-analysis

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: pr-build
          path: build/

      - name: Check bundle size
        run: |
          echo "Build size:"
          du -sh build/

          # Ensure build doesn't exceed 10MB
          BUILD_SIZE=$(du -sb build/ | cut -f1)
          MAX_SIZE=10485760  # 10MB in bytes
          if [ $BUILD_SIZE -gt $MAX_SIZE ]; then
            echo "Build size exceeds 10MB limit!"
            echo "Current size: $(du -sh build/)"
            exit 1
          fi
          echo "Build size is acceptable: $(du -sh build/)"

  # Lighthouse CI performance audit (uses shared build)
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build-for-analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-cache
        with:
          path: |
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: pr-build
          path: frontend/build/

      - name: Run Lighthouse CI
        working-directory: ./frontend
        run: npx @lhci/cli autorun

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: frontend/.lighthouseci/
          retention-days: 7
          if-no-files-found: ignore

  # E2E tests (Playwright — Chromium only for speed)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-cache
        with:
          path: |
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chromium only)
        working-directory: ./frontend
        run: npx playwright test --project=chromium
        timeout-minutes: 10

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  # PR comment with results summary
  pr-comment:
    name: PR Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        frontend-lint,
        backend-lint,
        affected-tests,
        security-scan,
        bundle-analysis,
        lighthouse,
        e2e-tests,
      ]
    steps:
      - name: Comment PR
        uses: actions/github-script@v8
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('## Pull Request Check Results')
            );

            const body = `## Pull Request Check Results

            | Check | Status |
            |-------|--------|
            | Frontend Lint | ${{ needs.frontend-lint.result == 'success' && '✅' || '❌' }} |
            | Backend Lint | ${{ needs.backend-lint.result == 'success' && '✅' || '❌' }} |
            | Tests | ${{ needs.affected-tests.result == 'success' && '✅' || '❌' }} |
            | Security | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |
            | Bundle Size | ${{ needs.bundle-analysis.result == 'success' && '✅' || '❌' }} |
            | Lighthouse | ${{ needs.lighthouse.result == 'success' && '✅' || '❌' }} |
            | E2E Tests | ${{ needs.e2e-tests.result == 'success' && '✅' || needs.e2e-tests.result == 'failure' && '⚠️' || '⏭️' }} |

            <details>
            <summary>Details</summary>

            - **Commit:** ${{ github.sha }}
            - **Author:** ${{ github.actor }}
            - **Workflow Run:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            </details>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
