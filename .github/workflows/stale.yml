name: Stale Issues

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC (18:00 KST)
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 90
          days-before-issue-close: 30
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-issue-message: >
            This issue has been inactive for 90 days.
            It will be closed in 30 days unless there is new activity.
            Add the `pinned` or `roadmap` label to exempt indefinitely.
          stale-pr-message: >
            This PR has been inactive for 60 days.
            It will be closed in 14 days unless updated.
            Push new commits or add `wip` label to keep open.
          close-issue-message: |
            Closed due to inactivity. Reopen if still relevant — full context preserved.
          close-pr-message: |
            Closed due to inactivity. Reopen and rebase if still relevant.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,in-progress,security,bug,roadmap"
          exempt-pr-labels: "pinned,in-progress,security,wip,dependencies"
          enable-statistics: true
          ascending: true
          operations-per-run: 100
