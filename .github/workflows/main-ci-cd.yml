name: Main CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Suppress "hint: Using 'master' as the name for the initial branch" from actions/checkout
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  # ========================================
  # Frontend Tests (parallel with frontend-build)
  # ========================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node
        with:
          save-cache: "false"

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        env:
          # Disable ANSI color codes in vitest output so the verify step's
          # grep can match plain text. Without this, summary line is wrapped
          # in escape sequences like "[2m      Tests [22m [1m[32m1189 passed[39m"
          # and the grep pattern fails to match.
          NO_COLOR: "1"
        run: CI=true npx vitest run --bail=1 --coverage 2>&1 | tee /tmp/vitest-output.txt
        timeout-minutes: 10

      - name: Verify README Vitest count matches reality
        run: |
          # Source of truth: actual Vitest stdout (handles it.each expansion correctly).
          # Pattern matches vitest summary line: "Tests  1189 passed (1189)"
          # NO_COLOR=1 above ensures no ANSI escapes.
          echo "─── Last 5 lines of vitest output ───"
          tail -5 /tmp/vitest-output.txt
          echo "─── Extracting count ───"
          ACTUAL=$(grep -oE 'Tests +[0-9]+ passed' /tmp/vitest-output.txt | tail -1 | grep -oE '[0-9]+' || true)
          README=$(grep -oE 'Vitest \([0-9]+ tests\)' README.md | grep -oE '[0-9]+' || true)
          echo "ACTUAL=$ACTUAL  README=$README"
          if [ -z "$ACTUAL" ]; then
            echo "❌ Could not extract Vitest count from test output"
            exit 1
          fi
          if [ "$ACTUAL" != "$README" ]; then
            echo "❌ README Vitest count drift: README says $README, vitest reality is $ACTUAL"
            echo ""
            echo "Run locally and commit the result:"
            echo "  ./scripts/update-test-counts.sh"
            exit 1
          fi
          echo "✓ README Vitest count matches reality ($ACTUAL)"

      - name: Fix coverage paths for Codecov
        if: always()
        run: |
          # lcov paths are relative to frontend/ — prefix with frontend/ for repo root
          sed -i 's|SF:src/|SF:frontend/src/|g' frontend/coverage/lcov.info

      - name: Pre-trust Codecov GPG key
        if: always()
        run: |
          gpg --batch --import <(curl -fsSL https://keybase.io/codecovsecurity/pgp_keys.asc)
          echo "27034E7FDB850E0BBC2C62FF806BB28AED779869:6:" | gpg --import-ownertrust

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          disable_search: true
          plugins: noop
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # Frontend Build (parallel with frontend-test)
  # ========================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node

      - name: Build frontend (no prerender — skips Playwright dependency)
        working-directory: ./frontend
        run: CI=false npm run build:no-prerender
        env:
          VITE_API_URL: https://api.emelmujiro.com/api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ========================================
  # Backend Tests
  # ========================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen --extra dev

      - name: Run backend tests with coverage
        working-directory: ./backend
        timeout-minutes: 5
        env:
          DATABASE_URL: ""
          SECRET_KEY: test-secret-key-that-is-at-least-fifty-bytes-long-for-hmac-sha256
          DEBUG: "True"
        run: |
          uv run coverage run --source=api manage.py test 2>&1 | tee /tmp/django-output.txt
          uv run coverage xml -o coverage.xml
          # Fix paths in coverage.xml for Codecov: api/file.py → backend/api/file.py
          sed -i 's|filename="api/|filename="backend/api/|g' coverage.xml
          sed -i 's|<source>.*</source>|<source>.</source>|g' coverage.xml

      - name: Verify tests don't pollute production log files
        working-directory: ./backend
        # settings.py routes file/security_file handlers to NullHandler when
        # sys.argv[1] == "test". If that isolation breaks, test fixtures (fake
        # IPs, simulated reCAPTCHA/SMTP failures) accumulate in production
        # backend/logs/{debug,security}.log on every test run.
        run: |
          if [ -s logs/security.log ] || [ -s logs/debug.log ]; then
            echo "❌ Backend tests polluted production log files:"
            ls -la logs/ 2>/dev/null
            echo "--- security.log (first 5) ---"
            head -5 logs/security.log 2>/dev/null || true
            echo "--- debug.log (first 5) ---"
            head -5 logs/debug.log 2>/dev/null || true
            exit 1
          fi
          echo "✓ Production log files not polluted by test run"

      - name: Verify README Django count matches reality
        run: |
          # Source of truth: Django test runner stdout — "Ran 353 tests in 0.384s"
          ACTUAL=$(grep -oE 'Ran [0-9]+ tests' /tmp/django-output.txt | tail -1 | grep -oE '[0-9]+')
          README=$(grep -oE 'Django unittest \([0-9]+ tests\)' README.md | grep -oE '[0-9]+')
          if [ -z "$ACTUAL" ]; then
            echo "❌ Could not extract Django test count from test output"
            exit 1
          fi
          if [ "$ACTUAL" != "$README" ]; then
            echo "❌ README Django count drift: README says $README, Django reality is $ACTUAL"
            echo ""
            echo "Run locally and commit the result:"
            echo "  ./scripts/update-test-counts.sh"
            exit 1
          fi
          echo "✓ README Django count matches reality ($ACTUAL)"

      - name: Pre-trust Codecov GPG key
        if: always()
        run: |
          gpg --batch --import <(curl -fsSL https://keybase.io/codecovsecurity/pgp_keys.asc)
          echo "27034E7FDB850E0BBC2C62FF806BB28AED779869:6:" | gpg --import-ownertrust

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          disable_search: true
          plugins: noop
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # Deploy to GitHub Pages
  # ========================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ========================================
  # Deploy to Mac Mini (via webhook)
  # ========================================
  deploy-mac-mini:
    name: Deploy to Mac Mini
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build, backend-test]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Trigger Mac Mini deploy
        env:
          DEPLOY_SECRET: ${{ secrets.MAC_MINI_DEPLOY_SECRET }}
        run: |
          if [ -z "$DEPLOY_SECRET" ]; then
            echo "⏭️ MAC_MINI_DEPLOY_SECRET not set — skipping Mac Mini deploy"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
            -X POST https://deploy.emelmujiro.com/deploy \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            --max-time 300) || {
            echo "::error::curl failed to connect (exit code $?)"
            exit 1
          }
          BODY=$(cat /tmp/deploy-response.txt)
          echo "HTTP $HTTP_CODE — $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Deploy webhook returned HTTP $HTTP_CODE — $BODY"
            exit 1
          fi
