name: Main CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: true

env:
  # Suppress "hint: Using 'master' as the name for the initial branch" from actions/checkout
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  # ========================================
  # Frontend Tests (parallel with frontend-build)
  # ========================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node
        with:
          save-cache: "false"

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        env:
          # Disable ANSI color codes in vitest output so the verify step's
          # grep can match plain text. Without this, summary line is wrapped
          # in escape sequences like "[2m      Tests [22m [1m[32m1189 passed[39m"
          # and the grep pattern fails to match.
          NO_COLOR: "1"
        run: CI=true npx vitest run --bail=1 --coverage 2>&1 | tee /tmp/vitest-output.txt
        timeout-minutes: 10

      # README Vitest count drift is auto-corrected by the sync-test-counts
      # job below — no strict gate here. Removed 2026-04-11 after the strict
      # regex coupling caused a self-inflicted CI break (the README format
      # was load-bearing on a grep pattern with no visible signal to the
      # author). See sync-test-counts job at the bottom of this file.

      - name: Fix coverage paths for Codecov
        if: always()
        run: |
          # lcov paths are relative to frontend/ — prefix with frontend/ for repo root
          sed -i 's|SF:src/|SF:frontend/src/|g' frontend/coverage/lcov.info

      - name: Pre-trust Codecov GPG key
        if: always()
        run: |
          gpg --batch --import <(curl -fsSL https://keybase.io/codecovsecurity/pgp_keys.asc)
          echo "27034E7FDB850E0BBC2C62FF806BB28AED779869:6:" | gpg --import-ownertrust

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          disable_search: true
          plugins: noop
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # Frontend Build (parallel with frontend-test)
  # ========================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node

      - name: Build frontend (no prerender — skips Playwright dependency)
        working-directory: ./frontend
        run: CI=false npm run build:no-prerender
        env:
          VITE_API_URL: https://api.emelmujiro.com/api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ========================================
  # Backend Tests
  # ========================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen --extra dev

      - name: Run backend tests with coverage
        working-directory: ./backend
        timeout-minutes: 5
        env:
          DATABASE_URL: ""
          SECRET_KEY: test-secret-key-that-is-at-least-fifty-bytes-long-for-hmac-sha256
          DEBUG: "True"
        run: |
          uv run coverage run --source=api manage.py test 2>&1 | tee /tmp/django-output.txt
          uv run coverage xml -o coverage.xml
          # Fix paths in coverage.xml for Codecov: api/file.py → backend/api/file.py
          sed -i 's|filename="api/|filename="backend/api/|g' coverage.xml
          sed -i 's|<source>.*</source>|<source>.</source>|g' coverage.xml

      - name: Verify tests don't pollute production log files
        working-directory: ./backend
        # settings.py routes file/security_file handlers to NullHandler when
        # sys.argv[1] == "test". If that isolation breaks, test fixtures (fake
        # IPs, simulated reCAPTCHA/SMTP failures) accumulate in production
        # backend/logs/{debug,security}.log on every test run.
        run: |
          if [ -s logs/security.log ] || [ -s logs/debug.log ]; then
            echo "❌ Backend tests polluted production log files:"
            ls -la logs/ 2>/dev/null
            echo "--- security.log (first 5) ---"
            head -5 logs/security.log 2>/dev/null || true
            echo "--- debug.log (first 5) ---"
            head -5 logs/debug.log 2>/dev/null || true
            exit 1
          fi
          echo "✓ Production log files not polluted by test run"

      # README Django count drift is auto-corrected by the sync-test-counts
      # job below — see frontend-test for the rationale.

      - name: Pre-trust Codecov GPG key
        if: always()
        run: |
          gpg --batch --import <(curl -fsSL https://keybase.io/codecovsecurity/pgp_keys.asc)
          echo "27034E7FDB850E0BBC2C62FF806BB28AED779869:6:" | gpg --import-ownertrust

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          disable_search: true
          plugins: noop
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # Auto-sync README test counts (replaces strict drift gates)
  # ========================================
  # Runs after both test jobs pass on main, re-runs the test suites,
  # rewrites README counts via update-test-counts.sh, and commits the diff
  # back with [skip ci] so it doesn't trigger another workflow run or a
  # redundant deploy. Loop prevention: GitHub Actions reads [skip ci] in
  # the commit message and skips ALL workflows for that commit.
  #
  # Concurrency: the workflow-level `cancel-in-progress: true` group means
  # if a new push lands during this job, this run is cancelled and the
  # newer run will sync from the latest state — no stale-state push.
  #
  # Permission: needs `contents: write` to push back to main. Scoped to
  # this job only, the rest of the workflow stays at the default `read`.
  sync-test-counts:
    name: Sync README Test Counts
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    timeout-minutes: 8

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node
        with:
          save-cache: "false"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen --extra dev

      - name: Run update-test-counts script
        env:
          DATABASE_URL: ""
          SECRET_KEY: test-secret-key-that-is-at-least-fifty-bytes-long-for-hmac-sha256
          DEBUG: "True"
        run: ./scripts/update-test-counts.sh

      - name: Commit and push if README changed
        run: |
          if git diff --quiet README.md; then
            echo "✓ README test counts already in sync — no commit needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): auto-sync test counts [skip ci]

          Auto-generated by sync-test-counts job in main-ci-cd.yml.
          Runs after frontend-test + backend-test pass on main.
          [skip ci] in the message tells GitHub Actions to not trigger
          another workflow run for this commit."
          # Rebase + retry in case main moved during this job. The cancel
          # -in-progress concurrency should prevent that, but the retry is
          # cheap insurance for the rare race where main moved between
          # checkout and push.
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              echo "✓ Pushed README sync (attempt $attempt)"
              exit 0
            fi
            echo "Push attempt $attempt failed — sleeping before retry..."
            sleep $((attempt * 5))
          done
          echo "❌ Push failed after 3 attempts"
          exit 1

  # ========================================
  # Deploy to Mac Mini (via webhook)
  # ========================================
  deploy-mac-mini:
    name: Deploy to Mac Mini
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build, backend-test]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Trigger Mac Mini deploy
        env:
          DEPLOY_SECRET: ${{ secrets.MAC_MINI_DEPLOY_SECRET }}
        run: |
          if [ -z "$DEPLOY_SECRET" ]; then
            echo "⏭️ MAC_MINI_DEPLOY_SECRET not set — skipping Mac Mini deploy"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
            -X POST https://deploy.emelmujiro.com/deploy \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            --max-time 300) || {
            echo "::error::curl failed to connect (exit code $?)"
            exit 1
          }
          BODY=$(cat /tmp/deploy-response.txt)
          echo "HTTP $HTTP_CODE — $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Deploy webhook returned HTTP $HTTP_CODE — $BODY"
            exit 1
          fi
