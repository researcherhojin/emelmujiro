name: Main CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================================
  # Frontend Tests + Build (combined to avoid duplicate setup)
  # ========================================
  frontend-test-and-build:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-cache
        with:
          path: |
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: CI=true npx vitest run --bail=1 --coverage
        timeout-minutes: 10

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          directory: frontend/coverage
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Get Playwright version
        if: github.ref == 'refs/heads/main'
        id: playwright-version
        working-directory: ./frontend
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: github.ref == 'refs/heads/main'
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium (for prerender)
        if: github.ref == 'refs/heads/main' && steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: github.ref == 'refs/heads/main' && steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: ./frontend
        run: npx playwright install-deps chromium

      - name: Build frontend
        if: github.ref == 'refs/heads/main'
        working-directory: ./frontend
        run: CI=false npm run build
        env:
          VITE_API_URL: https://api.emelmujiro.com/api

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ========================================
  # Backend Tests
  # ========================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen --extra dev

      - name: Run backend tests with coverage
        working-directory: ./backend
        timeout-minutes: 5
        env:
          DATABASE_URL: ""
          SECRET_KEY: test-secret-key
          DEBUG: "True"
        run: |
          uv run coverage run --parallel-mode --source=api manage.py test --parallel
          uv run coverage combine
          uv run coverage xml -o coverage.xml
          # Fix paths in coverage.xml for Codecov: api/file.py → backend/api/file.py
          sed -i 's|filename="api/|filename="backend/api/|g' coverage.xml
          sed -i 's|<source>.*</source>|<source>.</source>|g' coverage.xml

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # Deploy to GitHub Pages
  # ========================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [frontend-test-and-build]
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ========================================
  # Deploy to Mac Mini (via webhook)
  # ========================================
  deploy-mac-mini:
    name: Deploy to Mac Mini
    runs-on: ubuntu-latest
    needs: [frontend-test-and-build, backend-test]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Trigger Mac Mini deploy
        env:
          DEPLOY_SECRET: ${{ secrets.MAC_MINI_DEPLOY_SECRET }}
        run: |
          if [ -z "$DEPLOY_SECRET" ]; then
            echo "⏭️ MAC_MINI_DEPLOY_SECRET not set — skipping Mac Mini deploy"
            exit 0
          fi
          curl -f -X POST https://deploy.emelmujiro.com/deploy \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            --max-time 300
