name: Main CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================================
  # Frontend Tests (parallel with frontend-build)
  # ========================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: CI=true npx vitest run --bail=1 --coverage
        timeout-minutes: 10

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          directory: frontend/coverage
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # Frontend Build (parallel with frontend-test)
  # ========================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js with cache
        uses: ./.github/actions/setup-node

      - name: Get Playwright version
        id: playwright-version
        working-directory: ./frontend
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Cache Playwright system deps
        uses: actions/cache@v5
        id: playwright-deps-cache
        with:
          path: /tmp/playwright-apt-cache
          key: ${{ runner.os }}-playwright-deps-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium (full install)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (from apt cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        env:
          DEPS_CACHE_HIT: ${{ steps.playwright-deps-cache.outputs.cache-hit }}
        run: |
          if [ "$DEPS_CACHE_HIT" == "true" ] && [ -d /tmp/playwright-apt-cache ]; then
            echo "Restoring Playwright system deps from cache..."
            sudo cp /tmp/playwright-apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
            sudo apt-get install -y -f --no-download 2>/dev/null || cd frontend && npx playwright install-deps chromium
          else
            cd frontend && npx playwright install-deps chromium
          fi

      - name: Save Playwright apt packages to cache
        if: steps.playwright-deps-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/playwright-apt-cache
          cp /var/cache/apt/archives/*.deb /tmp/playwright-apt-cache/ 2>/dev/null || true

      - name: Build frontend
        working-directory: ./frontend
        run: CI=false npm run build
        env:
          VITE_API_URL: https://api.emelmujiro.com/api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v8
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ========================================
  # Backend Tests
  # ========================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen --extra dev

      - name: Run backend tests with coverage
        working-directory: ./backend
        timeout-minutes: 5
        env:
          DATABASE_URL: ""
          SECRET_KEY: test-secret-key
          DEBUG: "True"
        run: |
          uv run coverage run --source=api manage.py test
          uv run coverage xml -o coverage.xml
          # Fix paths in coverage.xml for Codecov: api/file.py → backend/api/file.py
          sed -i 's|filename="api/|filename="backend/api/|g' coverage.xml
          sed -i 's|<source>.*</source>|<source>.</source>|g' coverage.xml

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # Deploy to GitHub Pages
  # ========================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ========================================
  # Deploy to Mac Mini (via webhook)
  # ========================================
  deploy-mac-mini:
    name: Deploy to Mac Mini
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build, backend-test]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Trigger Mac Mini deploy
        env:
          DEPLOY_SECRET: ${{ secrets.MAC_MINI_DEPLOY_SECRET }}
        run: |
          if [ -z "$DEPLOY_SECRET" ]; then
            echo "⏭️ MAC_MINI_DEPLOY_SECRET not set — skipping Mac Mini deploy"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
            -X POST https://deploy.emelmujiro.com/deploy \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            --max-time 300) || {
            echo "::error::curl failed to connect (exit code $?)"
            exit 1
          }
          BODY=$(cat /tmp/deploy-response.txt)
          echo "HTTP $HTTP_CODE — $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Deploy webhook returned HTTP $HTTP_CODE — $BODY"
            exit 1
          fi
